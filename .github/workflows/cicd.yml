name: setup Application Infra
run-name: ${{ github.event.inputs.action_type }} Application Infra setup ${{ github.event.inputs.app-environment }}. Job ${{ github.job }} started by ${{ github.actor }}

on:
  workflow_dispatch:
    inputs: 
      app-environment:
        type: environment
        description: Select the environment
      action_type:
        type: choice
        description: type of action
        options: 
        - plan
        - apply
jobs:
  setup-application-infra:
    name: 'setup-application-infra'
    container:
      image: hashicorp/terraform:1.8.2 
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.app-environment }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: |
        terraform plan -out out.terraform

    - name: Terraform Apply
      if: github.event.inputs.action_type == 'apply'
      run: |
        terraform apply out.terraform
