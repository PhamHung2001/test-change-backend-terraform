name: terraform-migrate-dev-workspace

on:
  workflow_dispatch:


permissions:
  contents: read
  id-token: write

jobs:
  migrate-state:
    container:
      image: hashicorp/terraform:1.8.2 
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init old backend
        run: |
          terraform init

      - name: Pull and backup old state
        run: |
          terraform state pull > backup-old-state.tfstate
          cp backup-old-state.tfstate backup-old-state-$(date +%Y%m%d-%H%M%S).tfstate
          ls -lah *.tfstate

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-backup
          path: "*.tfstate"
          if-no-files-found: error

      - name: Re-init new backend
        run: |
          terraform init -reconfigure -backend-config=backend-dev.hcl

      - name: Create dev workspace from backup state
        run: |
          if terraform workspace select dev; then
            echo "Workspace dev already exists. Stop to avoid overwriting state."
            exit 1
          else
            terraform workspace new -state=backup-old-state.tfstate dev
          fi

      - name: Show current workspace
        run: terraform workspace show

      - name: Validate migrated state
        run: terraform plan -no-color
